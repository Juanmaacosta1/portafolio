<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Juan Acosta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <nav aria-label="Main navigation">
            <a href="../index.html" class="nav-link">Inicio</a>
            <a href="sobremi.html" class="nav-link">Sobre mí</a>
            <a href="contac.html" class="nav-link active" aria-current="page">Contacto</a>
        </nav>
    </header>

    <main id="contacto-main">
        <div class="container contacto-wrapper">
            <div class="contacto-info">
                <h2>_conectemos</h2>
                <p class="texto-lead">¿Tienes un proyecto en mente? ¿Quieres colaborar o simplemente hablar sobre tecnología y ciberseguridad? Estoy a solo un mensaje de distancia.</p>

            <div class="contacto-formulario">
                <h2>_escribime</h2>
                <form class="form" action="#" method="POST">
                    <div class="input-group">
                        <label for="nombre" class="sr-only">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="email" class="sr-only">Email</label>
                        <input type="email" id="email" name="email" placeholder="Tu email" required>
                    </div>
                    <div class="input-group">
                        <label for="asunto" class="sr-only">Asunto</label>
                        <input type="text" id="asunto" name="asunto" placeholder="Asunto">
                    </div>
                    <div class="input-group">
                        <label for="mensaje" class="sr-only">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" rows="6" placeholder="Tu mensaje..." required></textarea>
                    </div>
                    <button type="submit" class="button">Enviar mensaje</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <h4>"Todos los derechos reservados © 2026 - Juan Manuel Acosta"</h4>
    </footer>
</body>
</html>
